name: Deploy to staging (Firebase)
on:
  push:
    branches: [ staging ]
jobs:
  build_and_deploy:
    name: Build & deploy to staging
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [ 20.x ]
    steps:
       - name: Checkout repo
         uses: actions/checkout@v4
         with:
           fetch-depth: 0

       - name: Install dependencies
         run: npm ci

       - name: Build
         run: npm run build

       - name: Deploy to staging
         uses: FirebaseExtended/action-hosting-deploy@v0.7.1
         with:
           repoToken: ${{ secrets.GITHUB_TOKEN }}
           firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SELF_EDUCATION_26E10 }}
           projectId: self-education-26e10
           channelId: staging
           firebaseToolsVersion: 12.9.1
         env:
           FIREBASE_CLI_PREVIEWS: hostingchannels
